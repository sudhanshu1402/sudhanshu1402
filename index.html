<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE VAULT | Sudhanshu Singh</title>
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700&family=Syne:wght@400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="projects_data.js?v=vault-v2.1"></script>
    <style>
        :root {
            --bg: #F9FAFB;
            --surface: #FFFFFF;
            --surface-raised: #F3F4F6;
            --border: rgba(0, 0, 0, 0.08);
            --border-bright: rgba(0, 0, 0, 0.15);
            --text-primary: #111827;
            --text-secondary: #4B5563;
            --text-muted: #9CA3AF;
            --accent-primary: #2563EB; /* Electric Blue */
            --accent-glow: rgba(37, 99, 235, 0.2);
            --font-display: 'Syne', sans-serif;
            --font-body: 'Outfit', sans-serif;
            --font-mono: 'Space Grotesk', monospace;
            --card-width: 400px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none; /* Custom cursor implementation below */
        }

        body {
            background-color: var(--bg);
            color: var(--text-primary);
            font-family: var(--font-body);
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- Noise Overlay --- */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: url("https://grainy-gradients.vercel.app/noise.svg");
            opacity: 0.15;
            mix-blend-mode: multiply;
            z-index: 9999;
            pointer-events: none;
        }

        /* --- Custom Cursor --- */
        #cursor-dot {
            width: 6px;
            height: 6px;
            background: var(--text-primary);
            position: fixed;
            border-radius: 50%;
            z-index: 10000;
            pointer-events: none;
            transition: transform 0.1s ease;
        }
        #cursor-outline {
            width: 40px;
            height: 40px;
            border: 1px solid var(--border-bright);
            position: fixed;
            border-radius: 50%;
            z-index: 9999;
            pointer-events: none;
            transition: transform 0.15s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* --- Global Elements --- */
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
        }

        /* --- Navigation --- */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 1.5rem 4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            align-items: center;
            z-index: 1000;
        }

        .brand {
            font-family: var(--font-display);
            font-size: 1.25rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            text-transform: uppercase;
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
        }

        .nav-links a {
            color: var(--text-primary);
            text-decoration: none;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 500;
            opacity: 0.7;
            transition: opacity 0.3s ease;
        }

        .nav-links a:hover {
            opacity: 1;
        }

        /* --- Hero Section --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 6rem 4rem;
            position: relative;
        }

        .hero-title-container {
            margin-bottom: 2rem;
            overflow: hidden;
        }

        .hero h1 {
            font-family: var(--font-display);
            font-size: clamp(4rem, 15vw, 12rem);
            line-height: 0.85;
            font-weight: 800;
            letter-spacing: -0.04em;
            text-transform: uppercase;
            animation: slideUp 1.2s cubic-bezier(0.77, 0, 0.175, 1);
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .hero-footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-top: 1px solid var(--border);
            padding-top: 2rem;
        }

        .hero-desc {
            max-width: 500px;
            font-size: 1.125rem;
            color: var(--text-secondary);
            font-weight: 300;
        }

        .stat-badge {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--accent-primary);
            letter-spacing: 0.1em;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .stat-badge::before {
            content: "";
            width: 8px;
            height: 8px;
            background: var(--accent-primary);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-glow);
        }

        /* --- Filters --- */
        .filters {
            position: sticky;
            top: 5rem;
            z-index: 100;
            padding: 2rem 4rem;
            margin-top: 4rem;
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            background: transparent;
        }

        .filter-btn {
            background: rgba(0, 0, 0, 0.02);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 0.6rem 1.2rem;
            border-radius: 100px;
            font-family: var(--font-body);
            font-size: 0.85rem;
            font-weight: 400;
            cursor: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .filter-btn:hover {
            border-color: var(--border-bright);
            color: var(--text-primary);
            background: rgba(0, 0, 0, 0.05);
        }

        .filter-btn.active {
            background: var(--text-primary);
            color: var(--bg);
            border-color: var(--text-primary);
            font-weight: 600;
        }

        /* --- Grid Section --- */
        .vault-grid {
            padding: 0 4rem 10rem 4rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(var(--card-width), 1fr));
            gap: 1.5rem;
        }

        .project-card {
            height: 320px;
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
        }

        .project-card::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at var(--mouseX) var(--mouseY), rgba(0, 0, 0, 0.04) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .project-card:hover {
            border-color: var(--border-bright);
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.06);
        }

        .project-card:hover::after {
            opacity: 1;
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .project-id {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 0.1em;
        }

        .difficulty-tag {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            text-transform: uppercase;
            padding: 0.2rem 0.6rem;
            border: 1px solid var(--border);
            border-radius: 4px;
        }

        .project-name {
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 600;
            line-height: 1.1;
            margin: 1.5rem 0 0.5rem 0;
            letter-spacing: -0.01em;
        }

        .project-category {
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 300;
        }

        .card-footer {
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .launch-link {
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--text-muted);
            transition: color 0.3s ease;
        }

        .project-card:hover .launch-link {
            color: var(--accent-primary);
        }

        .arrow-icon {
            transform: rotate(-45deg);
            transition: transform 0.4s ease;
        }

        .project-card:hover .arrow-icon {
            transform: rotate(0deg);
            color: var(--text-primary);
        }

        /* --- Hero Badge --- */
        .hero-badge {
            position: absolute;
            top: 2rem;
            right: -2.5rem;
            background: linear-gradient(135deg, #F59E0B, #D97706);
            color: white;
            font-family: var(--font-mono);
            font-size: 0.6rem;
            font-weight: 700;
            padding: 0.25rem 3rem;
            transform: rotate(45deg);
            box-shadow: 0 4px 10px rgba(245, 158, 11, 0.3);
            letter-spacing: 0.1em;
            z-index: 10;
        }

        /* --- Responsive --- */
        @media (max-width: 900px) {
            nav, .hero, .filters, .vault-grid {
                padding-left: 2rem;
                padding-right: 2rem;
            }
            .nav-links { display: none; }
            :root { --card-width: 100%; }
        }

    </style>
</head>
<body>

    <div id="cursor-dot"></div>
    <div id="cursor-outline"></div>

    <nav>
        <div class="brand">S. Singh / ARCHIVE</div>
        <div class="nav-links">
            <a href="https://github.com/sudhanshu1402">GITHUB</a>
            <a href="https://linkedin.com/in/sudhanshusingh1402">LINKEDIN</a>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-title-container">
            <h1>VAULT</h1>
        </div>
        <div class="hero-title-container">
            <h1>ENGR.</h1>
        </div>
        <div class="hero-footer">
            <p class="hero-desc">An elite collection of historical artifacts. 83 projects decoded across 10 programming languages. Performance-driven, architecturally sound.</p>
            <div class="stat-badge">SYSTEM STATUS: OPTIMAL // ARCHIVE_83</div>
        </div>
    </header>

    <main>
        <div class="filters" id="filters">
            <button class="filter-btn active" data-filter="all">ALL DEPLOYMENTS</button>
            <button class="filter-btn" data-filter="ML/AI">ML / AI</button>
            <button class="filter-btn" data-filter="Python">PYTHON</button>
            <button class="filter-btn" data-filter="Java">JAVA</button>
            <button class="filter-btn" data-filter="Go">GO-LANG</button>
            <button class="filter-btn" data-filter="Rust">RUST</button>
            <button class="filter-btn" data-filter="Cpp">C++</button>
            <button class="filter-btn" data-filter="C">C</button>
            <button class="filter-btn" data-filter="Nodejs">NODE.JS</button>
            <button class="filter-btn" data-filter="Javascript">JAVASCRIPT</button>
            <button class="filter-btn" data-filter="Typescript">TYPESCRIPT</button>
            <button class="filter-btn" data-filter="CSharp">C#</button>
        </div>

        <div class="vault-grid" id="grid">
            <!-- Dynamically Injected -->
        </div>
    </main>

    <script>
        // --- Data Logic ---
        const data = typeof PROJECT_DATA !== 'undefined' ? PROJECT_DATA : [];
        const grid = document.getElementById('grid');
        const filtersContainer = document.getElementById('filters');

        function renderCards(projects) {
            grid.innerHTML = '';
            projects.forEach((proj, index) => {
                const card = document.createElement('a');
                card.href = proj.actionUrl;
                card.target = "_blank";
                card.className = 'glass project-card';
                
                // Difficulty Color Mapping
                let diffColor = '#666';
                if(proj.difficulty === 'Expert') diffColor = '#F87171'; // Red
                if(proj.difficulty === 'Hard') diffColor = '#FBBF24';   // Yellow
                if(proj.difficulty === 'Medium') diffColor = '#60A5FA'; // Blue

                card.innerHTML = `
                    ${proj.isHero ? '<div class="hero-badge">★ ELITE</div>' : ''}
                    <div class="card-top">
                        <span class="project-id">ID_${(index + 1).toString().padStart(3, '0')}</span>
                        <span class="difficulty-tag" style="border-color: ${diffColor}; color: ${diffColor}">${proj.difficulty}</span>
                    </div>
                    <div>
                        <h2 class="project-name">${proj.name}</h2>
                        <span class="project-category">${proj.category} — ${proj.type}</span>
                    </div>
                    <div class="card-footer">
                        <span class="launch-link">${proj.actionText}</span>
                        <svg class="arrow-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                    </div>
                `;

                // Interactive hover movement
                card.addEventListener('mousemove', (e) => {
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    card.style.setProperty('--mouseX', `${x}px`);
                    card.style.setProperty('--mouseY', `${y}px`);
                });

                grid.appendChild(card);
            });
        }

        renderCards(data);

        // --- Filter Logic ---
        filtersContainer.addEventListener('click', (e) => {
            if (e.target.tagName === 'BUTTON') {
                document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
                e.target.classList.add('active');
                const filter = e.target.getAttribute('data-filter');
                if (filter === 'all') {
                    renderCards(data);
                } else if (filter === 'Javascript') {
                    renderCards(data.filter(p => p.category === 'Javascript'));
                } else {
                    renderCards(data.filter(p => p.category === filter));
                }
            }
        });

        // --- Cursor Implementation ---
        const dot = document.getElementById('cursor-dot');
        const outline = document.getElementById('cursor-outline');

        window.addEventListener('mousemove', (e) => {
            const posX = e.clientX;
            const posY = e.clientY;

            dot.style.left = `${posX}px`;
            dot.style.top = `${posY}px`;

            outline.animate({
                left: `${posX - 20}px`,
                top: `${posY - 20}px`
            }, { duration: 500, fill: "forwards" });
        });

        // Hover scale for cursor
        document.querySelectorAll('.filter-btn, .project-card, a').forEach(el => {
            el.addEventListener('mouseenter', () => outline.style.transform = 'scale(1.5)');
            el.addEventListener('mouseleave', () => outline.style.transform = 'scale(1)');
        });

    </script>
</body>
</html>
